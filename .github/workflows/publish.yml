name: Publish to NuGet

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Extract version from tag
        id: version
        run: |
          # Strip leading 'v' from the tag name (e.g. v0.11.0 → 0.11.0).
          # Falls back to GitVersion semVer on workflow_dispatch from a branch.
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            # workflow_dispatch on a branch: derive version from GitVersion
            echo "version=$(dotnet tool run dotnet-gitversion /output json /showvariable SemVer 2>/dev/null || echo '0.0.0-dev')" >> $GITHUB_OUTPUT
          fi

      - name: Build
        run: dotnet build ZInject.slnx --configuration Release -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test tests/ZInject.Tests/ZInject.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack ZInject.slnx --configuration Release --no-build --output ./artifacts -p:Version=${{ steps.version.outputs.version }}

      - name: Push to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate

      - name: Push to GitHub Packages
        run: dotnet nuget push ./artifacts/*.nupkg --source https://nuget.pkg.github.com/MarcelRoozekrans/index.json --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
