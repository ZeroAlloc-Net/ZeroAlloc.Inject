name: CI

on:
  push:
    branches: [main, 'release-please--**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore ZeroAlloc.Inject.slnx

      - name: Build
        run: dotnet build ZeroAlloc.Inject.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/ZeroAlloc.Inject.Tests/ZeroAlloc.Inject.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Pack (verify)
        run: dotnet pack ZeroAlloc.Inject.slnx --configuration Release --no-build --output ./artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./artifacts/*.nupkg
